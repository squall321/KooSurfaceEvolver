name: Build & Release

on:
  push:
    tags:
      - 'v*'          # v0.1.0, v1.0.0 등 태그 푸시 시 빌드+릴리스
  workflow_dispatch:    # 수동 실행 가능

permissions:
  contents: write      # Release 생성에 필요

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: kse-windows
            zip_name: kse-windows-x64.zip
          - os: ubuntu-22.04
            artifact: kse-linux
            zip_name: kse-linux-x64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-fea.txt
          pip install pyinstaller
          pip install -e .
        env:
          KSE_BUILD_C_EXT: '0'   # CI에서는 C 확장 빌드 스킵

      # CadQuery는 대형 패키지이므로 CI에서는 선택적 설치
      # 설치 실패해도 빌드는 진행 (STEP 기능만 제외)
      - name: Install CadQuery (optional)
        continue-on-error: true
        run: pip install cadquery>=2.3

      - name: Make SE binary executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x src/evolver

      - name: Build with PyInstaller
        run: pyinstaller kse.spec --clean --noconfirm

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: dist\kse\kse.exe --help

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: ./dist/kse/kse --help

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\kse\* -DestinationPath ${{ matrix.zip_name }}
        shell: pwsh

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.zip_name }} -C dist kse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_name }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kse-windows/kse-windows-x64.zip
            artifacts/kse-linux/kse-linux-x64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
